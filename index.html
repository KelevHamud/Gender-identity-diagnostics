<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>BSRI: Психодиагностика</title>
    <style>
        :root { --bg: #F5F5F7; --text: #1D1D1F; --accent: #0071E3; --card: #FFFFFF; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); padding: 60px 20px; display: flex; justify-content: center; }
        .container { max-width: 500px; width: 100%; }
        .card { background: var(--card); padding: 40px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); text-align: center; }
        .question-text { font-size: 22px; font-weight: 600; margin-bottom: 40px; min-height: 80px; }
        .btn-group { display: flex; gap: 15px; justify-content: center; }
        button { padding: 16px 40px; border-radius: 980px; border: none; font-weight: 600; cursor: pointer; transition: 0.2s; font-size: 16px; }
        .yes { background: var(--accent); color: white; }
        .no { background: #E5E5EA; color: #3A3A3C; }
        button:active { transform: scale(0.95); }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="card" id="start">
        <h1>BSRI: Психодиагностика</h1>
        <p>Выберите пол для корректной интерпретации данных.</p>
        <button class="yes" onclick="start('male')">Мужской профиль</button>
        <button class="yes" style="background:#E53935;" onclick="start('female')">Женский профиль</button>
    </div>

    <div class="card hidden" id="quiz">
        <div id="q-text" class="question-text"></div>
        <div class="btn-group">
            <button class="no" onclick="answer(0)">Нет</button>
            <button class="yes" onclick="answer(1)">Да</button>
        </div>
    </div>

    <div class="card hidden" id="result">
        <h1>Ваш профиль</h1>
        <div id="report-text" style="text-align: left; line-height: 1.6;"></div>
        <button class="yes" style="width:100%; margin-top:20px;" onclick="location.reload()">Начать заново</button>
    </div>
</div>

<script>
    const items = [
        {t: "Самостоятельный", type: "M"}, {t: "Ласковый", type: "F"}, {t: "Аккуратный", type: "N"},
        {t: "Амбициозный", type: "M"}, {t: "Чувствительный", type: "F"}, {t: "Надежный", type: "N"},
        {t: "Аналитичный", type: "M"}, {t: "Заботливый", type: "F"}, {t: "Веселый", type: "N"},
        {t: "Напористый", type: "M"}, {t: "Мягкий", type: "F"}, {t: "Скромный", type: "N"},
        {t: "Конкурентный", type: "M"}, {t: "Эмпатичный", type: "F"}, {t: "Искренний", type: "N"},
        {t: "Решительный", type: "M"}, {t: "Миролюбивый", type: "F"}, {t: "Пунктуальный", type: "N"},
        {t: "Доминирующий", type: "M"}, {t: "Нежный", type: "F"}, {t: "Сдержанный", type: "N"},
        {t: "Лидер", type: "M"}, {t: "Сердечный", type: "F"}, {t: "Дружелюбный", type: "N"},
        {t: "Сильный", type: "M"}, {t: "Доверчивый", type: "F"}, {t: "Оптимистичный", type: "N"},
        {t: "Независимый", type: "M"}, {t: "Понимающий", type: "F"}, {t: "Любопытный", type: "N"},
        {t: "Агрессивный", type: "M"}, {t: "Уступчивый", type: "F"}, {t: "Терпеливый", type: "N"},
        {t: "Мужественный", type: "M"}, {t: "Женственный", type: "F"}, {t: "Честный", type: "N"},
        {t: "Деловой", type: "M"}, {t: "Эмоциональный", type: "F"}, {t: "Спокойный", type: "N"},
        {t: "Смелый", type: "M"}, {t: "Милосердный", type: "F"}, {t: "Внимательный", type: "N"},
        {t: "Самодостаточный", type: "M"}, {t: "Скромный", type: "F"}, {t: "Творческий", type: "N"},
        {t: "Рациональный", type: "M"}, {t: "Сопереживающий", type: "F"}, {t: "Ответственный", type: "N"},
        {t: "Рисковый", type: "M"}, {t: "Теплый", type: "F"}, {t: "Застенчивый", type: "N"},
        {t: "Уверенный", type: "M"}, {t: "Чувственный", type: "F"}, {t: "Талантливый", type: "N"},
        {t: "Индивидуалист", type: "M"}, {t: "Домашний", type: "F"}, {t: "Упрямый", type: "N"}
    ];

    let current = 0, m = 0, f = 0;

    function start(g) {
        document.getElementById('start').classList.add('hidden');
        document.getElementById('quiz').classList.remove('hidden');
        showQ();
    }

    function showQ() {
        document.getElementById('q-text').innerText = items[current].t;
    }

    function answer(val) {
        if(val) {
            if(items[current].type === 'M') m++;
            if(items[current].type === 'F') f++;
        }
        current++;
        if(current < items.length) showQ();
        else finish();
    }

    function finish() {
        document.getElementById('quiz').classList.add('hidden');
        document.getElementById('result').classList.remove('hidden');
        let type = (m > 10 && f > 10) ? "Андрогинный (целостный)" : (m > f) ? "Маскулинный (инструментальный)" : "Фемининный (экспрессивный)";
        document.getElementById('report-text').innerHTML = `
            <p>Ваши показатели: <b>M: ${m}/20</b>, <b>F: ${f}/20</b>.</p>
            <p>Ваш тип: <strong>${type}</strong>.</p>
            <p>Это классификация вашего текущего адаптивного стиля. Помните: высокий балл — это наличие навыка, а не биологическая данность. Стремитесь к гармонии обоих начал.</p>`;
    }
</script>
</body>
</html>
