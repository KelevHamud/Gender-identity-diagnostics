<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Гендерный профиль личности</title>
    <style>
        :root { --bg: #F5F5F7; --card: #FFFFFF; --accent: #0071E3; --text: #1D1D1F; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: var(--bg); color: var(--text); padding: 40px 20px; display: flex; justify-content: center; }
        .container { max-width: 600px; width: 100%; }
        .card { background: var(--card); padding: 40px; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        h1 { font-size: 28px; text-align: center; margin-bottom: 20px; }
        .intro { color: #86868B; text-align: center; margin-bottom: 30px; }
        button { background: var(--accent); color: white; border: none; padding: 15px 25px; border-radius: 980px; font-weight: 500; cursor: pointer; width: 100%; margin-top: 10px; }
        .item { margin-bottom: 15px; }
        select { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #D2D2D7; margin-top: 5px; }
        #result { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="quiz" class="card">
        <h1>Анализ гендерных характеристик</h1>
        <p class="intro">Этот тест помогает определить степень выраженности маскулинных и фемининных качеств в вашем характере. Оцените, насколько каждое из качеств описывает вас.</p>
        <div id="questions"></div>
        <button onclick="calculate()">Узнать результат</button>
    </div>

    <div id="result" class="card">
        <h1>Ваш профиль</h1>
        <div id="report"></div>
        <button onclick="location.reload()">Пройти заново</button>
    </div>
</div>

<script>
    const traits = [
        { name: "Самостоятельность", type: "M" }, { name: "Заботливость", type: "F" },
        { name: "Агрессивность", type: "M" }, { name: "Нежность", type: "F" },
        { name: "Аналитичность", type: "M" }, { name: "Чувствительность", type: "F" },
        { name: "Лидерские качества", type: "M" }, { name: "Уступчивость", type: "F" },
        { name: "Решительность", type: "M" }, { name: "Эмпатия", type: "F" },
        { name: "Соревновательность", type: "M" }, { name: "Склонность к сопереживанию", type: "F" },
        { name: "Напористость", type: "M" }, { name: "Мягкость", type: "F" },
        { name: "Сила воли", type: "M" }, { name: "Доброта", type: "F" },
        { name: "Смелость", type: "M" }, { name: "Искренность", type: "F" },
        { name: "Независимость", type: "M" }, { name: "Понимание", type: "F" }
    ];

    const qDiv = document.getElementById('questions');
    traits.forEach((t, i) => {
        qDiv.innerHTML += `<div class="item">
            <label>${t.name}</label>
            <select id="q${i}">
                <option value="1">Почти никогда не описывает меня</option>
                <option value="4">Средне</option>
                <option value="7">Почти всегда описывает меня</option>
            </select>
        </div>`;
    });

    function calculate() {
        let m = 0, f = 0;
        traits.forEach((t, i) => {
            let val = parseInt(document.getElementById('q'+i).value);
            t.type === "M" ? m += val : f += val;
        });

        m /= 10; f /= 10;
        
        let type = "";
        if (m > 5 && f > 5) type = "Андрогинный тип (высокая гибкость).";
        else if (m > 5) type = "Маскулинный тип (ориентация на достижение).";
        else if (f > 5) type = "Фемининный тип (ориентация на отношения).";
        else type = "Недифференцированный тип (низкая выраженность обоих начал).";

        document.getElementById('quiz').style.display = 'none';
        document.getElementById('result').style.display = 'block';
        document.getElementById('report').innerHTML = `
            <p>Ваши показатели: <b>Маскулинность: ${m.toFixed(1)}</b>, <b>Фемининность: ${f.toFixed(1)}</b>.</p>
            <h3>Интерпретация: ${type}</h3>
            <p>Согласно методологии, маскулинность и фемининность — это не противоположности, а два независимых измерения. 
            Если вы получили высокие баллы по обеим шкалам, вы обладаете <b>андрогинной структурой личности</b> — это считается наиболее адаптированным типом в современном мире, так как позволяет проявлять как решительность (маскулинные черты), так и гибкость (фемининные черты) в зависимости от ситуации. 
            Если преобладает одна шкала — это не «отклонение», а ваш текущий адаптивный стиль, который помогает вам достигать целей или сохранять отношения. Помните, что данные качества — это инструменты, которые можно развивать осознанно.</p>
        `;
    }
</script>
</body>
</html>
