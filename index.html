<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>BSRI: Психодиагностика</title>
    <style>
        :root { --bg: #F5F5F7; --text: #1D1D1F; --accent: #0071E3; --card: #FFFFFF; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: var(--bg); color: var(--text); padding: 60px 20px; display: flex; justify-content: center; margin: 0; transition: background-color 0.6s ease; }
        .container { max-width: 500px; width: 100%; }
        .card { background: var(--card); padding: 40px; border-radius: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.08); text-align: center; }
        .question-text { font-size: 26px; font-weight: 600; margin: 40px 0; min-height: 100px; }
        button { padding: 18px 45px; border-radius: 980px; border: none; font-weight: 600; cursor: pointer; margin: 5px; font-size: 17px; transition: 0.3s; }
        .main-btn { background: var(--accent); color: white; }
        .no { background: #E5E5EA; color: #3A3A3C; }
        .analysis-box { text-align: left; background: rgba(0,0,0,0.03); padding: 25px; border-radius: 20px; margin-top: 20px; line-height: 1.7; }
    </style>
</head>
<body>

<div class="container">
    <div class="card" id="start">
        <h1>BSRI Psychometrics</h1>
        <p>Выберите пол для калибровки нормативной модели:</p>
        <button id="btn-m" class="main-btn" style="background:#0071E3;" onclick="startQuiz('male')">Мужчина</button>
        <button id="btn-f" class="main-btn" style="background:#D81B60;" onclick="startQuiz('female')">Женщина</button>
    </div>

    <div class="card hidden" id="quiz">
        <div id="q-text" class="question-text"></div>
        <div id="buttons">
            <button class="no" onclick="answer(0)">Нет</button>
            <button class="main-btn" onclick="answer(1)">Да</button>
        </div>
    </div>

    <div class="card hidden" id="result">
        <div id="report-text" style="text-align: left;"></div>
        <button class="main-btn" style="width:100%; margin-top:30px;" onclick="location.reload()">Начать заново</button>
    </div>
</div>

<script>
    const items = [
        {t: "Самостоятельный", f: "Самостоятельная", type: "M"}, {t: "Ласковый", f: "Ласковая", type: "F"}, {t: "Аккуратный", f: "Аккуратная", type: "N"},
        {t: "Амбициозный", f: "Амбициозная", type: "M"}, {t: "Чувствительный", f: "Чувствительная", type: "F"}, {t: "Надежный", f: "Надежная", type: "N"},
        {t: "Аналитичный", f: "Аналитичная", type: "M"}, {t: "Заботливый", f: "Заботливая", type: "F"}, {t: "Веселый", f: "Веселая", type: "N"},
        {t: "Напористый", f: "Напористая", type: "M"}, {t: "Мягкий", f: "Мягкая", type: "F"}, {t: "Скромный", f: "Скромная", type: "N"},
        {t: "Конкурентный", f: "Конкурентная", type: "M"}, {t: "Эмпатичный", f: "Эмпатичная", type: "F"}, {t: "Искренний", f: "Искренняя", type: "N"},
        {t: "Решительный", f: "Решительная", type: "M"}, {t: "Миролюбивый", f: "Миролюбивая", type: "F"}, {t: "Пунктуальный", f: "Пунктуальная", type: "N"},
        {t: "Доминирующий", f: "Доминирующая", type: "M"}, {t: "Нежный", f: "Нежная", type: "F"}, {t: "Сдержанный", f: "Сдержанная", type: "N"},
        {t: "Лидер", f: "Лидер", type: "M"}, {t: "Сердечный", f: "Сердечная", type: "F"}, {t: "Дружелюбный", f: "Дружелюбная", type: "N"},
        {t: "Сильный", f: "Сильная", type: "M"}, {t: "Доверчивый", f: "Доверчивая", type: "F"}, {t: "Оптимистичный", f: "Оптимистичная", type: "N"},
        {t: "Независимый", f: "Независимая", type: "M"}, {t: "Понимающий", f: "Понимающая", type: "F"}, {t: "Любопытный", f: "Любопытная", type: "N"},
        {t: "Агрессивный", f: "Агрессивная", type: "M"}, {t: "Уступчивый", f: "Уступчивая", type: "F"}, {t: "Терпеливый", f: "Терпеливая", type: "N"},
        {t: "Мужественный", f: "Мужественная", type: "M"}, {t: "Женственный", f: "Женственная", type: "F"}, {t: "Честный", f: "Честная", type: "N"},
        {t: "Деловой", f: "Деловая", type: "M"}, {t: "Эмоциональный", f: "Эмоциональная", type: "F"}, {t: "Спокойный", f: "Спокойная", type: "N"},
        {t: "Смелый", f: "Смелая", type: "M"}, {t: "Милосердный", f: "Милосердная", type: "F"}, {t: "Внимательный", f: "Внимательная", type: "N"},
        {t: "Самодостаточный", f: "Самодостаточная", type: "M"}, {t: "Скромный", f: "Скромная", type: "F"}, {t: "Творческий", f: "Творческая", type: "N"},
        {t: "Рациональный", f: "Рациональная", type: "M"}, {t: "Сопереживающий", f: "Сопереживающая", type: "F"}, {t: "Ответственный", f: "Ответственная", type: "N"},
        {t: "Склонный к риску", f: "Склонная к риску", type: "M"}, {t: "Теплый", f: "Теплая", type: "F"}, {t: "Застенчивый", f: "Застенчивая", type: "N"},
        {t: "Уверенный", f: "Уверенная", type: "M"}, {t: "Чувственный", f: "Чувственная", type: "F"}, {t: "Талантливый", f: "Талантливая", type: "N"},
        {t: "Индивидуалист", f: "Индивидуалистка", type: "M"}, {t: "Домашний", f: "Домашняя", type: "F"}, {t: "Упрямый", f: "Упрямая", type: "N"},
        {t: "Настойчивый", f: "Настойчивая", type: "M"}, {t: "Покладистый", f: "Покладистая", type: "F"}, {t: "Загадочный", f: "Загадочная", type: "N"}
    ];

    let current = 0, mScore = 0, fScore = 0, nScore = 0, userGender = "";

    function startQuiz(gender) {
        userGender = gender;
        const root = document.documentElement;
        // Применяем цветовую схему ко всему интерфейсу
        if (gender === 'male') {
            root.style.setProperty('--bg', '#E0E8F0');
            root.style.setProperty('--accent', '#0071E3');
        } else {
            root.style.setProperty('--bg', '#FCE4EC');
            root.style.setProperty('--accent', '#D81B60');
        }
        document.getElementById('start').classList.add('hidden');
        document.getElementById('quiz').classList.remove('hidden');
        showQ();
    }

    function showQ() {
        // Если выбрана женщина, берем поле 'f', иначе 't'
        let text = (userGender === 'female') ? items[current].f : items[current].t;
        document.getElementById('q-text').innerText = text;
    }

    function answer(val) {
        if(val === 1) {
            if(items[current].type === 'M') mScore++;
            if(items[current].type === 'F') fScore++;
            if(items[current].type === 'N') nScore++;
        }
        current++;
        current < items.length ? showQ() : finish();
    }

    function finish() {
        document.getElementById('quiz').classList.add('hidden');
        document.getElementById('result').classList.remove('hidden');
        document.getElementById('report-text').innerHTML = `
            <h2 style="text-align:center">Аналитический отчет</h2>
            <div class="analysis-box">
                Маскулинность: ${mScore}/20 | Фемининность: ${fScore}/20 | Андрогинность: ${nScore}/20
            </div>
            <div class="analysis-box">${generateDeepAnalysis()}</div>`;
    }

    function generateDeepAnalysis() {
        if (mScore >= 12 && fScore >= 12) return "Ваш результат — <b>Андрогинность</b>: в личности гармонично сочетаются Маскулинность и Фемининность.";
        if (mScore > fScore) return "Ваш профиль — <b>Маскулинность</b>: доминируют стратегии контроля и достижения.";
        if (fScore > mScore) return "Ваш профиль — <b>Фемининность</b>: доминируют стратегии гармонизации и эмпатии.";
        return "Ваш профиль — <b>Недифференцированный</b>: требуется осознанное развитие Маскулинности и Фемининности.";
    }
</script>
</body>
</html>
