<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Психодиагностический комплекс BSRI</title>
    <style>
        :root { --bg: #F5F5F7; --text: #1D1D1F; --accent: #0071E3; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); padding: 40px; display: flex; justify-content: center; }
        .card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); max-width: 600px; width: 100%; }
        .trait { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        input[type="number"] { width: 50px; padding: 5px; border: 1px solid #ccc; border-radius: 5px; }
        button { background: var(--accent); color: white; border: none; padding: 15px 30px; border-radius: 980px; font-weight: 600; cursor: pointer; width: 100%; margin-top: 20px; }
    </style>
</head>
<body>

<div class="card" id="test-body">
    <h1>Опросник гендерных ролей (BSRI)</h1>
    <p>Оцените по шкале от 1 до 7, насколько каждое качество характерно для вас (1 — никогда, 7 — всегда).</p>
    <div id="items-list"></div>
    <button onclick="calculateBSRI()">Анализировать профиль</button>
</div>

<div class="card" id="results" style="display:none;">
    <h1>Отчет по результатам</h1>
    <div id="output"></div>
    <button onclick="location.reload()">Сбросить данные</button>
</div>

<script>
    const bsrItems = [
        {t: "Самостоятельный", type: "M"}, {t: "Ласковый", type: "F"}, {t: "Аккуратный", type: "N"},
        {t: "Амбициозный", type: "M"}, {t: "Чувствительный", type: "F"}, {t: "Надежный", type: "N"},
        {t: "Аналитичный", type: "M"}, {t: "Заботливый", type: "F"}, {t: "Веселый", type: "N"},
        {t: "Напористый", type: "M"}, {t: "Мягкий", type: "F"}, {t: "Скромный", type: "N"},
        {t: "Конкурентный", type: "M"}, {t: "Эмпатичный", type: "F"}, {t: "Искренний", type: "N"},
        {t: "Решительный", type: "M"}, {t: "Миролюбивый", type: "F"}, {t: "Пунктуальный", type: "N"},
        {t: "Доминирующий", type: "M"}, {t: "Нежный", type: "F"}, {t: "Сдержанный", type: "N"},
        {t: "Лидер", type: "M"}, {t: "Сердечный", type: "F"}, {t: "Дружелюбный", type: "N"},
        {t: "Сильный", type: "M"}, {t: "Доверчивый", type: "F"}, {t: "Оптимистичный", type: "N"},
        {t: "Независимый", type: "M"}, {t: "Понимающий", type: "F"}, {t: "Любопытный", type: "N"},
        {t: "Агрессивный", type: "M"}, {t: "Уступчивый", type: "F"}, {t: "Терпеливый", type: "N"},
        {t: "Мужественный", type: "M"}, {t: "Женственный", type: "F"}, {t: "Честный", type: "N"},
        {t: "Деловой", type: "M"}, {t: "Эмоциональный", type: "F"}, {t: "Спокойный", type: "N"},
        {t: "Смелый", type: "M"}, {t: "Милосердный", type: "F"}, {t: "Внимательный", type: "N"},
        {t: "Самодостаточный", type: "M"}, {t: "Скромный", type: "F"}, {t: "Творческий", type: "N"},
        {t: "Рациональный", type: "M"}, {t: "Сопереживающий", type: "F"}, {t: "Ответственный", type: "N"},
        {t: "Рисковый", type: "M"}, {t: "Теплый", type: "F"}, {t: "Застенчивый", type: "N"},
        {t: "Уверенный", type: "M"}, {t: "Чувственный", type: "F"}, {t: "Талантливый", type: "N"},
        {t: "Индивидуалист", type: "M"}, {t: "Домашний", type: "F"}, {t: "Упрямый", type: "N"}
    ];

    const list = document.getElementById('items-list');
    bsrItems.forEach((item, i) => {
        list.innerHTML += `<div class="trait"><span>${item.t}</span><input type="number" min="1" max="7" value="4" id="r${i}"></div>`;
    });

    function calculateBSRI() {
        let m = 0, f = 0;
        bsrItems.forEach((item, i) => {
            let val = parseInt(document.getElementById('r'+i).value);
            if(item.type === "M") m += val;
            if(item.type === "F") f += val;
        });
        m /= 20; f /= 20;

        // Расчет андрогинности по формуле t-критерия (упрощенно для веба)
        let report = `<h2>Ваш гендерный профиль</h2>
            <p>Индекс маскулинности: <b>${m.toFixed(2)}</b> (Инструментальность)</p>
            <p>Индекс фемининности: <b>${f.toFixed(2)}</b> (Экспрессивность)</p>
            <h3>Аналитический отчет:</h3>
            <p>${generateInterpretation(m, f)}</p>`;
        
        document.getElementById('test-body').style.display = 'none';
        document.getElementById('results').style.display = 'block';
        document.getElementById('output').innerHTML = report;
    }

    function generateInterpretation(m, f) {
        if (m > 4.9 && f > 4.9) return "Вы обладаете <b>андрогинным профилем</b>. Это состояние психологической интеграции, при котором личность свободна от жестких гендерных стереотипов. Вы эффективно сочетаете агентность (действие) и общинность (чувства). Это позволяет вам адаптироваться к любым социальным вызовам, выбирая наиболее подходящую стратегию поведения, а не ту, что «предписана» биологическим полом.";
        if (m > f) return "Ваш профиль демонстрирует <b>выраженную маскулинную ориентацию</b>. Вы опираетесь на инструментальные стратегии: контроль, логику, достижение целей и автономию. Ваша «Тень» — это подавление экспрессивных аспектов (эмпатии, мягкости), которые могут быть необходимы для глубокой межличностной коммуникации.";
        if (f > m) return "Ваш профиль демонстрирует <b>выраженную фемининную ориентацию</b>. Вы опираетесь на экспрессивные стратегии: заботу, эмпатию, эмоциональную связь и создание гармонии. Ваша «Тень» — это потенциальная нехватка жесткости в отстаивании границ, что может приводить к самопожертвованию во вред собственным амбициям.";
        return "Ваш профиль характеризуется как <b>низкодифференцированный</b>. Это может свидетельствовать о переходном этапе идентичности, когда старые способы адаптации ослабли, а новые еще не сформированы. Рекомендуется обратить внимание на развитие обеих сторон — как личных амбиций, так и навыков эмоциональной близости.";
    }
</script>
</body>
</html>
