<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Анализ идентичности</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #F5F5F7; --card: #FFFFFF; --accent: #0071E3; --text: #1D1D1F; --gray: #86868B; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 60px 20px; margin: 0; }
        .container { max-width: 550px; width: 100%; }
        .card { background: var(--card); padding: 40px; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.06); }
        h1 { font-size: 32px; font-weight: 700; letter-spacing: -0.8px; text-align: center; }
        .description { text-align: center; color: var(--gray); margin-bottom: 30px; line-height: 1.5; }
        button { background: var(--accent); color: white; border: none; padding: 16px 24px; border-radius: 12px; font-weight: 600; cursor: pointer; width: 100%; margin-top: 15px; font-size: 16px; transition: transform 0.2s, opacity 0.2s; }
        button:hover { opacity: 0.9; }
        button:active { transform: scale(0.98); }
        .option-btn { background: #F5F5F7; color: var(--text); border: 1px solid #D2D2D7; text-align: left; }
        .question { display: none; }
        .active { display: block; }
        .result-box { margin-top: 30px; padding: 20px; background: #F5F5F7; border-radius: 16px; }
    </style>
</head>
<body>

<div class="container">
    <div id="setup" class="card active">
        <h1>Identity Insight</h1>
        <p class="description">Инструмент для диагностики архетипических паттернов вашей личности на основе методологии Сандры Бем.</p>
        <button onclick="startQuiz('male')">Пройти (Мужской профиль)</button>
        <button onclick="startQuiz('female')" style="background: #E53935;">Пройти (Женский профиль)</button>
    </div>

    <div id="quiz-container" class="card" style="display:none;">
        <div id="questions-wrapper"></div>
    </div>

    <div id="result" class="card" style="display:none;">
        <h1>Ваш отчет</h1>
        <canvas id="radarChart"></canvas>
        <div id="archetype-details" class="result-box"></div>
        <button onclick="location.reload()" style="background:#1D1D1F;">Начать заново</button>
    </div>
</div>

<script>
    const questions = [
        { q: "Как вы обычно планируете проекты?", a: "Четкая иерархия и контроль", b: "Атмосфера доверия", c: "Инновации и смыслы", d: "Ожидание помощи" },
        { q: "Ваша реакция на несправедливость?", a: "Защита границ", b: "Поиск компромисса", c: "Анализ урока", d: "Чувство бессилия" },
        { q: "Что для вас означает 'сила'?", a: "Способность влиять", b: "Способность любить", c: "Способность понимать", d: "Способность выживать" },
        { q: "Как вы действуете в стрессе?", a: "Концентрируюсь", b: "Ищу поддержку", c: "Ищу новые идеи", d: "Впадаю в ступор" },
        // ... (добавьте оставшиеся вопросы)
    ];

    let userGender, currentStep = 0;
    let scores = { A: 0, B: 0, C: 0, D: 0 }; 

    function startQuiz(gender) {
        userGender = gender;
        document.getElementById('setup').style.display = 'none';
        document.getElementById('quiz-container').style.display = 'block';
        renderQuestions();
    }

    function renderQuestions() {
        const wrapper = document.getElementById('questions-wrapper');
        questions.forEach((q, i) => {
            const div = document.createElement('div');
            div.className = `question ${i === 0 ? 'active' : ''}`;
            div.innerHTML = `<h3>${q.q}</h3>
                <button class="option-btn" onclick="next('A')">${q.a}</button>
                <button class="option-btn" onclick="next('B')">${q.b}</button>
                <button class="option-btn" onclick="next('C')">${q.c}</button>
                <button class="option-btn" onclick="next('D')">${q.d}</button>`;
            wrapper.appendChild(div);
        });
    }

    function next(code) {
        scores[code]++;
        document.querySelectorAll('.question')[currentStep].classList.remove('active');
        currentStep++;
        if (currentStep < questions.length) document.querySelectorAll('.question')[currentStep].classList.add('active');
        else showResult();
    }

    function showResult() {
        document.getElementById('quiz-container').style.display = 'none';
        document.getElementById('result').style.display = 'block';
        
        new Chart(document.getElementById('radarChart'), {
            type: 'radar',
            data: {
                labels: ['Маскулинность', 'Фемининность', 'Андрогинность', 'Диффузность'],
                datasets: [{ data: [scores.A*5, scores.B*5, scores.C*5, scores.D*5], backgroundColor: 'rgba(0, 113, 227, 0.2)', borderColor: '#0071E3' }]
            }
        });

        let details = `<h3>Интерпретация:</h3>`;
        if (scores.A > scores.B) details += `<p>В вас доминирует <b>активное маскулинное начало</b>. Вы ориентированы на достижение целей. Для баланса — попробуйте направить эту энергию на заботу и эмпатию.</p>`;
        else details += `<p>В вас преобладает <b>фемининное начало</b>. Вы мастер создания гармонии. Для развития — попробуйте чаще брать на себя роль лидера и принимать жесткие решения.</p>`;
        
        details += `<p><b>Глубинная рекомендация:</b> Идеальный баланс достигается через интеграцию. ${userGender === 'male' ? 'Развитие Анимы (мягкости)' : 'Развитие Анимуса (твердости)'} поможет вам стать более целостной личностью.</p>`;
        document.getElementById('archetype-details').innerHTML = details;
    }
</script>
</body>
</html>
