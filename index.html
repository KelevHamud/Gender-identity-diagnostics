<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Identity Insight: BSRI</title>
    <style>
        :root { 
            --bg: #F5F5F7; 
            --text: #1D1D1F; 
            --accent: #0071E3; 
            --card: #FFFFFF; 
            --progress-bg: #E5E5EA;
        }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            padding: 60px 20px; 
            display: flex; 
            justify-content: center; 
            margin: 0;
            transition: background-color 0.8s ease; /* Плавная смена цвета фона */
        }

        .container { max-width: 500px; width: 100%; }
        
        .card { 
            background: var(--card); 
            padding: 40px; 
            border-radius: 28px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.07); 
            text-align: center;
            transition: transform 0.3s ease;
        }

        .progress-container {
            width: 100%;
            height: 4px;
            background: var(--progress-bg);
            border-radius: 2px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        
        #progress-fill {
            height: 100%;
            width: 0%;
            background: var(--accent);
            transition: width 0.3s ease;
        }

        .question-text { 
            font-size: 26px; 
            font-weight: 600; 
            margin-bottom: 40px; 
            min-height: 100px; 
            line-height: 1.3; 
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-group { display: flex; gap: 15px; justify-content: center; }
        
        button { 
            padding: 18px 45px; 
            border-radius: 980px; 
            border: none; 
            font-weight: 600; 
            cursor: pointer; 
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); 
            font-size: 17px; 
        }

        .yes { background: var(--accent); color: white; }
        .no { background: #E5E5EA; color: #3A3A3C; }
        
        button:hover { transform: translateY(-2px); filter: brightness(1.1); }
        button:active { transform: scale(0.96); }

        .hidden { display: none; }
        
        .analysis-box { 
            text-align: left; 
            background: rgba(0,0,0,0.03); 
            padding: 25px; 
            border-radius: 18px; 
            margin-top: 20px; 
            font-size: 15px; 
            line-height: 1.6; 
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card" id="start">
        <h1>Identity Insight</h1>
        <p style="color:#86868B; margin-bottom: 30px;">Выберите ваш пол для настройки интерфейса и калибровки профиля:</p>
        <button class="yes" style="background:#0071E3;" onclick="startQuiz('male')">Мужчина</button>
        <button class="yes" style="background:#FF3B30;" onclick="startQuiz('female')">Женщина</button>
    </div>

    <div class="card hidden" id="quiz">
        <div class="progress-container">
            <div id="progress-fill"></div>
        </div>
        <div style="font-size: 12px; color: #86868B; margin-bottom: 10px;" id="counter">Вопрос 1 из 60</div>
        <div id="q-text" class="question-text">Загрузка...</div>
        <div class="btn-group">
            <button class="no" onclick="answer(0)">Нет</button>
            <button class="yes" id="main-yes" onclick="answer(1)">Да</button>
        </div>
    </div>

    <div id="result" class="card hidden">
        <h1>Ваш отчет</h1>
        <div id="report-text"></div>
        <button class="yes" id="reset-btn" style="width:100%; margin-top:30px;" onclick="location.reload()">Пройти заново</button>
    </div>
</div>

<script>
    const items = [
        {t: "Самостоятельный", type: "M"}, {t: "Уступчивый", type: "F"}, {t: "Помощник", type: "N"},
        {t: "Защищающий свои взгляды", type: "M"}, {t: "Жизнерадостный", type: "F"}, {t: "Застенчивый", type: "N"},
        {t: "Склонный к риску", type: "M"}, {t: "Преданный", type: "F"}, {t: "Искренний", type: "N"},
        {t: "Доминирующий", type: "M"}, {t: "Нежный", type: "F"}, {t: "Дружелюбный", type: "N"},
        {t: "Мужественный", type: "M"}, {t: "Любящий детей", type: "F"}, {t: "Тактичный", type: "N"},
        {t: "Решительный", type: "M"}, {t: "Понимающий других", type: "F"}, {t: "Надежный", type: "N"},
        {t: "Лидер", type: "M"}, {t: "Ласковый", type: "F"}, {t: "Аккуратный", type: "N"},
        {t: "Сильный", type: "M"}, {t: "Мягкий", type: "F"}, {t: "Честный", type: "N"},
        {t: "Агрессивный", type: "M"}, {t: "Доверчивый", type: "F"}, {t: "Спокойный", type: "N"},
        {t: "Амбициозный", type: "M"}, {t: "Теплый", type: "F"}, {t: "Вежливый", type: "N"},
        {t: "Независимый", type: "M"}, {t: "Заботливый", type: "F"}, {t: "Исполнительный", type: "N"},
        {t: "Аналитичный", type: "M"}, {t: "Миролюбивый", type: "F"}, {t: "Терпеливый", type: "N"},
        {t: "Напористый", type: "M"}, {t: "Чувствительный", type: "F"}, {t: "Скромный", type: "N"},
        {t: "Конкурентный", type: "M"}, {t: "Эмпатичный", type: "F"}, {t: "Сдержанный", type: "N"},
        {t: "Деловой", type: "M"}, {t: "Эмоциональный", type: "F"}, {t: "Справедливый", type: "N"},
        {t: "Смелый", type: "M"}, {t: "Милосердный", type: "F"}, {t: "Внимательный", type: "N"},
        {t: "Самодостаточный", type: "M"}, {t: "Тихий", type: "F"}, {t: "Оптимистичный", type: "N"},
        {t: "Индивидуалист", type: "M"}, {t: "Мягкосердечный", type: "F"}, {t: "Любознательный", type: "N"},
        {t: "Настойчивый", type: "M"}, {t: "Покладистый", type: "F"}, {t: "Загадочный", type: "N"},
        {t: "Дерзкий", type: "M"}, {t: "Женственный", type: "F"}, {t: "Адаптивный", type: "N"}
    ];

    let current = 0, mScore = 0, fScore = 0, nScore = 0, userGender = "";

    function startQuiz(gender) {
        userGender = gender;
        
        // Настройка цветов в зависимости от гендера
        if (gender === 'male') {
            document.documentElement.style.setProperty('--bg', '#F0F4F8'); // Серо-голубой
            document.documentElement.style.setProperty('--accent', '#0071E3');
        } else {
            document.documentElement.style.setProperty('--bg', '#FFF0F5'); // Розовый лаванда
            document.documentElement.style.setProperty('--accent', '#FF3B30');
            document.getElementById('main-yes').style.background = '#FF3B30';
            document.getElementById('reset-btn').style.background = '#FF3B30';
        }

        document.getElementById('start').classList.add('hidden');
        document.getElementById('quiz').classList.remove('hidden');
        showQ();
    }

    function showQ() {
        document.getElementById('counter').innerText = `Вопрос ${current + 1} из 60`;
        document.getElementById('q-text').innerText = items[current].t;
        document.getElementById('progress-fill').style.width = `${((current + 1) / 60) * 100}%`;
    }

    function answer(val) {
        if(val === 1) {
            if(items[current].type === 'M') mScore++;
            if(items[current].type === 'F') fScore++;
            if(items[current].type === 'N') nScore++;
        }
        current++;
        if(current < items.length) {
            showQ();
        } else {
            finish();
        }
    }

    function finish() {
        document.getElementById('quiz').classList.add('hidden');
        document.getElementById('result').classList.remove('hidden');
        
        let matrix = "";
        let advice = "";

        if (mScore >= 12 && fScore >= 12) {
            matrix = "Андрогинный тип";
            advice = "Вы обладаете высокой психологической пластичностью. Вы эффективно используете как мужские, так и женские стратегии поведения в зависимости от ситуации.";
        } else if (mScore > fScore) {
            matrix = "Маскулинный тип";
            advice = "Ваша идентичность сильно связана с инструментальными чертами. Рекомендуется развивать навыки эмоционального интеллекта для баланса.";
        } else if (fScore > mScore) {
            matrix = "Фемининный тип";
            advice = "Вы ориентированы на экспрессивность и отношения. Рекомендуется практиковать автономность и решительность для укрепления личных границ.";
        } else {
            matrix = "Недифференцированный тип";
            advice = "Ваши гендерные паттерны выражены слабо. Это может быть периодом трансформации или специфическим стилем адаптации.";
        }

        document.getElementById('report-text').innerHTML = `
            <div style="font-size:20px; margin-bottom:10px;">Профиль: <strong>${matrix}</strong></div>
            <div style="color:#86868B; margin-bottom:20px;">М: ${mScore} | Ж: ${fScore} | Нейтральность: ${nScore}</div>
            <div class="analysis-box">
                <strong>Интерпретация:</strong><br>${advice}<br><br>
                Показатель нейтральности (андрогинности) ${nScore}/20 указывает на вашу общую социальную приспособляемость независимо от гендерных ролей.
            </div>`;
    }
</script>
</body>
</html>
