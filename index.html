<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Identity Insight</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #F5F5F7; --card: #FFFFFF; --accent: #0071E3; --text: #1D1D1F; --gray: #86868B; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 40px 20px; margin: 0; }
        .container { max-width: 500px; width: 100%; }
        .card { background: var(--card); padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        h1 { font-weight: 600; font-size: 28px; letter-spacing: -0.5px; text-align: center; margin-bottom: 20px; }
        button { background: var(--accent); color: white; border: none; padding: 14px 24px; border-radius: 980px; font-weight: 500; cursor: pointer; width: 100%; margin-top: 15px; font-size: 16px; transition: opacity 0.2s; }
        button:hover { opacity: 0.8; }
        .btn-opt { background: #F5F5F7; color: var(--text); border: 1px solid #D2D2D7; margin-bottom: 10px; }
        .btn-opt:hover { background: #E8E8ED; }
        .question { display: none; }
        .active { display: block; }
        .archetype-box { background: #F5F5F7; padding: 20px; border-radius: 12px; margin-top: 20px; font-size: 14px; line-height: 1.5; }
    </style>
</head>
<body>

<div class="container">
    <div id="setup" class="card active">
        <h1>Identity Insight</h1>
        <p style="text-align:center; color:var(--gray);">Выберите пол для калибровки архетипической модели.</p>
        <button onclick="startQuiz('male')">Мужской профиль</button>
        <button onclick="startQuiz('female')" style="background: #E53935;">Женский профиль</button>
    </div>

    <div id="quiz-container" class="card" style="display:none;">
        <div id="questions-wrapper"></div>
    </div>

    <div id="result" class="card" style="display:none;">
        <h1>Ваш профиль</h1>
        <canvas id="radarChart"></canvas>
        <div id="archetype-details"></div>
        <button onclick="location.reload()" style="background:#1D1D1F;">Начать заново</button>
    </div>
</div>

<script>
    const questions = [
        { q: "Ваш приоритет в делах?", a: "Структура/Контроль", b: "Эмпатия/Связи", c: "Инсайт/Смыслы", d: "Ожидание поддержки" },
        { q: "Реакция на вызов?", a: "Бой", b: "Дипломатия", c: "Анализ", d: "Уход" },
        { q: "Главная ценность?", a: "Статус", b: "Любовь", c: "Мудрость", d: "Безопасность" },
        { q: "Как принимаете решения?", a: "Логика", b: "Интуиция", c: "Опыт", d: "Сомнения" },
        { q: "Отношение к деньгам?", a: "Ресурс влияния", b: "Средство помощи", c: "Инструмент познания", d: "Гарантия выживания" },
        { q: "Ваш стиль в конфликте?", a: "Доминирование", b: "Сглаживание", c: "Переоценка", d: "Избегание" },
        { q: "Идеал силы?", a: "Власть", b: "Милосердие", c: "Знание", d: "Выносливость" },
        { q: "Что важнее в партнере?", a: "Верность целям", b: "Теплота", c: "Интеллект", d: "Забота" },
        { q: "Как вы отдыхаете?", a: "Спорт/Действие", b: "Общение", c: "Одиночество/Раздумья", d: "Сон" },
        { q: "Отношение к переменам?", a: "Создаю их", b: "Принимаю их", c: "Изучаю их", d: "Боюсь их" },
        { q: "Ваша роль в группе?", a: "Лидер", b: "Душа", c: "Советник", d: "Исполнитель" },
        { q: "Что для вас успех?", a: "Достижение", b: "Признание", c: "Осознание", d: "Стабильность" },
        { q: "Реакция на ошибку?", a: "Вывод", b: "Покаяние", c: "Урок", d: "Страх" },
        { q: "Ваш главный принцип?", a: "Побеждать", b: "Любить", c: "Знать", d: "Надеяться" },
        { q: "Отношение к риску?", a: "Драйв", b: "Осторожность", c: "Эксперимент", d: "Избегание" },
        { q: "Дом для вас?", a: "Крепость", b: "Очаг", c: "Мастерская", d: "Убежище" },
        { q: "При критике вы?", a: "Атакуете", b: "Оправдываетесь", c: "Анализируете", d: "Замыкаетесь" },
        { q: "Отношение к дисциплине?", a: "Основа", b: "Ограничение", c: "Инструмент", d: "Тягость" },
        { q: "Источник вдохновения?", a: "Победа", b: "Чувство", c: "Тайны", d: "Мечты" },
        { q: "Как чувствуете себя сейчас?", a: "Уверенно", b: "Спокойно", c: "Любопытно", d: "В поиске" }
    ];

    let userGender, currentStep = 0;
    let scores = { A: 0, B: 0, C: 0, D: 0 };

    function startQuiz(gender) {
        userGender = gender;
        document.getElementById('setup').style.display = 'none';
        document.getElementById('quiz-container').style.display = 'block';
        init();
    }

    function init() {
        const wrapper = document.getElementById('questions-wrapper');
        questions.forEach((q, i) => {
            const div = document.createElement('div');
            div.className = `question ${i === 0 ? 'active' : ''}`;
            div.innerHTML = `<h3>${q.q}</h3><div class="options">
                <button class="btn-opt" onclick="next('A')">${q.a}</button>
                <button class="btn-opt" onclick="next('B')">${q.b}</button>
                <button class="btn-opt" onclick="next('C')">${q.c}</button>
                <button class="btn-opt" onclick="next('D')">${q.d}</button>
            </div>`;
            wrapper.appendChild(div);
        });
    }

    function next(code) {
        scores[code]++;
        document.querySelectorAll('.question')[currentStep].classList.remove('active');
        currentStep++;
        if (currentStep < 20) document.querySelectorAll('.question')[currentStep].classList.add('active');
        else showResult();
    }

    function showResult() {
        document.getElementById('quiz-container').style.display = 'none';
        document.getElementById('result').style.display = 'block';
        
        const data = [(scores.A/20)*100, (scores.B/20)*100, (scores.C/20)*100, (scores.D/20)*100];
        new Chart(document.getElementById('radarChart'), {
            type: 'radar',
            data: { labels: ['Маск.', 'Фем.', 'Андро.', 'Дифф.'], datasets: [{ data: data, backgroundColor: 'rgba(0, 113, 227, 0.2)', borderColor: '#0071E3' }] },
            options: { plugins: { legend: { display: false } }, scales: { r: { min: 0, max: 100 } } }
        });

        let minKey = Object.keys(scores).reduce((a, b) => scores[a] < scores[b] ? a : b);
        let advice = minKey === 'A' ? "Развивайте Агентность (целеполагание)." : 
                     minKey === 'B' ? "Развивайте Эмпатию (отношения)." : 
                     minKey === 'C' ? "Развивайте Осознанность (анализ)." : "Вы в процессе трансформации.";
        
        document.getElementById('archetype-details').innerHTML = `<div class="archetype-box">${advice} <strong>Совет:</strong> Практикуйте архетип, противоположный вашему минимуму, для достижения андрогинного баланса.</div>`;
    }
</script>
</body>
</html>
