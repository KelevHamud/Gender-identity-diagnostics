<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Identity Insight: Трансформация</title>
    <style>
        :root { --bg: #F5F5F7; --text: #1D1D1F; --accent: #0071E3; --card: #FFFFFF; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); padding: 40px 20px; display: flex; justify-content: center; margin: 0; transition: background-color 0.8s ease; }
        .container { max-width: 550px; width: 100%; }
        .card { background: var(--card); padding: 40px; border-radius: 28px; box-shadow: 0 15px 35px rgba(0,0,0,0.07); text-align: center; }
        .progress-bar { width: 100%; height: 6px; background: #E5E5EA; border-radius: 3px; margin-bottom: 20px; overflow: hidden; }
        #fill { height: 100%; width: 0%; background: var(--accent); transition: width 0.3s ease; }
        .question-text { font-size: 26px; font-weight: 600; margin: 30px 0; min-height: 100px; display: flex; align-items: center; justify-content: center; }
        .btn-group { display: flex; gap: 15px; justify-content: center; }
        button { padding: 18px 45px; border-radius: 980px; border: none; font-weight: 600; cursor: pointer; transition: 0.2s; font-size: 17px; }
        .yes { background: var(--accent); color: white; }
        .no { background: #E5E5EA; color: #3A3A3C; }
        .analysis-box { text-align: left; background: rgba(0,0,0,0.03); padding: 25px; border-radius: 18px; margin-top: 20px; font-size: 15px; line-height: 1.6; border-left: 4px solid var(--accent); }
        ul { padding-left: 20px; }
        li { margin-bottom: 8px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="card" id="start">
        <h1>Identity Insight</h1>
        <p>Выберите ваш пол для калибровки рекомендаций:</p>
        <button class="yes" onclick="startQuiz('male')">Мужчина</button>
        <button class="yes" style="background:#FF3B30;" onclick="startQuiz('female')">Женщина</button>
    </div>

    <div class="card hidden" id="quiz">
        <div class="progress-bar"><div id="fill"></div></div>
        <div id="q-text" class="question-text"></div>
        <div class="btn-group">
            <button class="no" onclick="answer(0)">Нет</button>
            <button class="yes" id="main-yes" onclick="answer(1)">Да</button>
        </div>
    </div>

    <div class="card hidden" id="result">
        <h1>Ваш психологический разбор</h1>
        <div id="report-text"></div>
        <button class="yes" id="reset-btn" style="width:100%; margin-top:30px;" onclick="location.reload()">Начать заново</button>
    </div>
</div>

<script>
    const items = [
        {t: "Самостоятельный", type: "M"}, {t: "Уступчивый", type: "F"}, {t: "Помощник", type: "N"},
        {t: "Защищающий свои взгляды", type: "M"}, {t: "Жизнерадостный", type: "F"}, {t: "Застенчивый", type: "N"},
        {t: "Склонный к риску", type: "M"}, {t: "Преданный", type: "F"}, {t: "Искренний", type: "N"},
        {t: "Доминирующий", type: "M"}, {t: "Нежный", type: "F"}, {t: "Дружелюбный", type: "N"},
        {t: "Мужественный", type: "M"}, {t: "Любящий детей", type: "F"}, {t: "Тактичный", type: "N"},
        {t: "Решительный", type: "M"}, {t: "Понимающий других", type: "F"}, {t: "Надежный", type: "N"},
        {t: "Лидер", type: "M"}, {t: "Ласковый", type: "F"}, {t: "Аккуратный", type: "N"},
        {t: "Сильный", type: "M"}, {t: "Мягкий", type: "F"}, {t: "Честный", type: "N"},
        {t: "Агрессивный", type: "M"}, {t: "Доверчивый", type: "F"}, {t: "Спокойный", type: "N"},
        {t: "Амбициозный", type: "M"}, {t: "Теплый", type: "F"}, {t: "Вежливый", type: "N"},
        {t: "Независимый", type: "M"}, {t: "Заботливый", type: "F"}, {t: "Исполнительный", type: "N"},
        {t: "Аналитичный", type: "M"}, {t: "Миролюбивый", type: "F"}, {t: "Терпеливый", type: "N"},
        {t: "Напористый", type: "M"}, {t: "Чувствительный", type: "F"}, {t: "Скромный", type: "N"},
        {t: "Конкурентный", type: "M"}, {t: "Эмпатичный", type: "F"}, {t: "Сдержанный", type: "N"},
        {t: "Деловой", type: "M"}, {t: "Эмоциональный", type: "F"}, {t: "Справедливый", type: "N"},
        {t: "Смелый", type: "M"}, {t: "Милосердный", type: "F"}, {t: "Внимательный", type: "N"},
        {t: "Самодостаточный", type: "M"}, {t: "Тихий", type: "F"}, {t: "Оптимистичный", type: "N"},
        {t: "Индивидуалист", type: "M"}, {t: "Мягкосердечный", type: "F"}, {t: "Любознательный", type: "N"},
        {t: "Настойчивый", type: "M"}, {t: "Покладистый", type: "F"}, {t: "Загадочный", type: "N"},
        {t: "Дерзкий", type: "M"}, {t: "Женственный", type: "F"}, {t: "Адаптивный", type: "N"}
    ];

    let current = 0, mScore = 0, fScore = 0, nScore = 0, userGender = "";
    let missedM = [], missedF = [];

    function startQuiz(gender) {
        userGender = gender;
        if (gender === 'male') {
            document.documentElement.style.setProperty('--bg', '#F0F4F8');
            document.documentElement.style.setProperty('--accent', '#0071E3');
        } else {
            document.documentElement.style.setProperty('--bg', '#FFF0F5');
            document.documentElement.style.setProperty('--accent', '#FF3B30');
            document.getElementById('main-yes').style.background = '#FF3B30';
        }
        document.getElementById('start').classList.add('hidden');
        document.getElementById('quiz').classList.remove('hidden');
        showQ();
    }

    function showQ() {
        document.getElementById('q-text').innerText = items[current].t;
        document.getElementById('fill').style.width = `${((current + 1) / 60) * 100}%`;
    }

    function answer(val) {
        if(val === 1) {
            if(items[current].type === 'M') mScore++;
            if(items[current].type === 'F') fScore++;
            if(items[current].type === 'N') nScore++;
        } else {
            if(items[current].type === 'M') missedM.push(items[current].t);
            if(items[current].type === 'F') missedF.push(items[current].t);
        }
        current++;
        if(current < items.length) showQ();
        else finish();
    }

    function finish() {
        document.getElementById('quiz').classList.add('hidden');
        document.getElementById('result').classList.remove('hidden');
        
        let matrix = "";
        let advice = "";

        if (mScore >= 12 && fScore >= 12) {
            matrix = "Андрогинный тип (Гармония)";
            advice = "<p>Вы успешно интегрировали в себе оба полюса. Вы умеете быть решительным и эмпатичным одновременно.</p>";
        } else if (userGender === 'male' && fScore > mScore) {
            matrix = "Фемининный профиль (у мужчины)";
            advice = `<div class="analysis-box">
                <strong>Рекомендация по усилению мужских качеств:</strong><br>
                Ваша мягкость — это сила, но для баланса вам стоит осознанно внедрять в жизнь следующие дефицитарные для вас качества:
                <ul>
                    <li><strong>${missedM[0] || 'Решительность'}:</strong> Начните брать на себя ответственность в бытовых спорах.</li>
                    <li><strong>${missedM[1] || 'Склонность к риску'}:</strong> Пробуйте новое, не боясь ошибиться.</li>
                    <li><strong>${missedM[2] || 'Настойчивость'}:</strong> Не отступайте, если считаете себя правым.</li>
                </ul>
            </div>`;
        } else if (userGender === 'female' && mScore > fScore) {
            matrix = "Маскулинный профиль (у женщины)";
            advice = `<div class="analysis-box">
                <strong>Рекомендация по интеграции женских качеств:</strong><br>
                Ваша решительность помогает в карьере, но для внутренней гармонии попробуйте разблокировать:
                <ul>
                    <li><strong>${missedF[0] || 'Эмпатия'}:</strong> Учитесь просто слушать, не предлагая сразу решение проблемы.</li>
                    <li><strong>${missedF[1] || 'Мягкость'}:</strong> Позвольте себе проявлять уязвимость в близком кругу.</li>
                    <li><strong>${missedF[2] || 'Миролюбие'}:</strong> Ищите компромисс там, где привыкли подавлять.</li>
                </ul>
            </div>`;
        } else {
            matrix = mScore > fScore ? "Маскулинный тип" : "Фемининный тип";
            advice = `<p>Ваш вектор развития — постепенная интеграция качеств противоположного полюса для достижения андрогинности.</p>`;
        }

        document.getElementById('report-text').innerHTML = `
            <h3>${matrix}</h3>
            <p>Баллы: Мужские ${mScore} | Женские ${fScore} | Нейтральные ${nScore}</p>
            ${advice}
        `;
    }
</script>
</body>
</html>
