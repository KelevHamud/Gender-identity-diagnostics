<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>BSRI: Анализ гендерных паттернов</title>
    <style>
        :root { --bg: #F5F5F7; --text: #1D1D1F; --accent: #0071E3; --card: #FFFFFF; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); padding: 40px 20px; display: flex; justify-content: center; }
        .container { max-width: 600px; width: 100%; }
        .card { background: var(--card); padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        h1 { font-size: 26px; text-align: center; margin-bottom: 20px; }
        .q-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #E5E5EA; }
        .btn-group { display: flex; gap: 8px; }
        button { border: none; padding: 8px 18px; border-radius: 980px; cursor: pointer; font-weight: 500; transition: all 0.2s; }
        .btn-no { background: #E5E5EA; }
        .btn-yes { background: var(--accent); color: white; }
        .selected { background: #1D1D1F !important; color: white; }
        .submit-btn { width: 100%; padding: 16px; background: var(--accent); color: white; border-radius: 12px; margin-top: 30px; font-weight: 600; font-size: 16px; }
        #results { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="card" id="gender-selection">
        <h1>BSRI: Психодиагностика</h1>
        <p style="text-align:center; color:#86868B;">Выберите пол для корректной интерпретации нормативов согласно методике Бем:</p>
        <button class="submit-btn" onclick="setGender('male')">Мужской профиль</button>
        <button class="submit-btn" style="background:#E53935;" onclick="setGender('female')">Женский профиль</button>
    </div>

    <div class="card" id="quiz-area" style="display:none;">
        <div id="questions"></div>
        <button class="submit-btn" onclick="calculate()">Завершить анализ</button>
    </div>

    <div class="card" id="results">
        <h1>Ваш отчет</h1>
        <div id="report-text"></div>
        <button class="submit-btn" onclick="location.reload()">Пройти заново</button>
    </div>
</div>

<script>
    const items = [
        {t: "Самостоятельный", type: "M"}, {t: "Ласковый", type: "F"}, {t: "Аккуратный", type: "N"},
        {t: "Амбициозный", type: "M"}, {t: "Чувствительный", type: "F"}, {t: "Надежный", type: "N"},
        {t: "Аналитичный", type: "M"}, {t: "Заботливый", type: "F"}, {t: "Веселый", type: "N"},
        {t: "Напористый", type: "M"}, {t: "Мягкий", type: "F"}, {t: "Скромный", type: "N"},
        {t: "Конкурентный", type: "M"}, {t: "Эмпатичный", type: "F"}, {t: "Искренний", type: "N"},
        {t: "Решительный", type: "M"}, {t: "Миролюбивый", type: "F"}, {t: "Пунктуальный", type: "N"},
        {t: "Доминирующий", type: "M"}, {t: "Нежный", type: "F"}, {t: "Сдержанный", type: "N"},
        {t: "Лидер", type: "M"}, {t: "Сердечный", type: "F"}, {t: "Дружелюбный", type: "N"},
        {t: "Сильный", type: "M"}, {t: "Доверчивый", type: "F"}, {t: "Оптимистичный", type: "N"},
        {t: "Независимый", type: "M"}, {t: "Понимающий", type: "F"}, {t: "Любопытный", type: "N"},
        {t: "Агрессивный", type: "M"}, {t: "Уступчивый", type: "F"}, {t: "Терпеливый", type: "N"},
        {t: "Мужественный", type: "M"}, {t: "Женственный", type: "F"}, {t: "Честный", type: "N"},
        {t: "Деловой", type: "M"}, {t: "Эмоциональный", type: "F"}, {t: "Спокойный", type: "N"},
        {t: "Смелый", type: "M"}, {t: "Милосердный", type: "F"}, {t: "Внимательный", type: "N"},
        {t: "Самодостаточный", type: "M"}, {t: "Скромный", type: "F"}, {t: "Творческий", type: "N"},
        {t: "Рациональный", type: "M"}, {t: "Сопереживающий", type: "F"}, {t: "Ответственный", type: "N"},
        {t: "Рисковый", type: "M"}, {t: "Теплый", type: "F"}, {t: "Застенчивый", type: "N"},
        {t: "Уверенный", type: "M"}, {t: "Чувственный", type: "F"}, {t: "Талантливый", type: "N"},
        {t: "Индивидуалист", type: "M"}, {t: "Домашний", type: "F"}, {t: "Упрямый", type: "N"}
    ];

    let userGender = "";
    let responses = new Array(60).fill(null);

    function setGender(g) {
        userGender = g;
        document.getElementById('gender-selection').style.display = 'none';
        document.getElementById('quiz-area').style.display = 'block';
        const qContainer = document.getElementById('questions');
        items.forEach((item, i) => {
            qContainer.innerHTML += `<div class="q-row"><span>${item.t}</span><div class="btn-group"><button class="btn-no" onclick="select(${i}, 0, this)">Нет</button><button class="btn-yes" onclick="select(${i}, 1, this)">Да</button></div></div>`;
        });
    }

    function select(idx, val, btn) {
        responses[idx] = val;
        btn.parentElement.querySelectorAll('button').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
    }

    function calculate() {
        let m = 0, f = 0;
        responses.forEach((res, i) => {
            if(res === 1) {
                if(items[i].type === 'M') m++;
                if(items[i].type === 'F') f++;
            }
        });

        // Классификация Бем (используем порог 10 как точку отсчета для 20 пунктов)
        let matrix = "";
        if (m > 10 && f > 10) matrix = "Андрогинный тип";
        else if (m > 10 && f <= 10) matrix = "Маскулинный тип";
        else if (f > 10 && m <= 10) matrix = "Фемининный тип";
        else matrix = "Недифференцированный тип";

        document.getElementById('quiz-area').style.display = 'none';
        document.getElementById('results').style.display = 'block';
        document.getElementById('report-text').innerHTML = `
            <p>Результаты профиля:</p>
            <ul><li>Маскулинность (M): ${m}/20</li><li>Фемининность (F): ${f}/20</li></ul>
            <p><strong>Ваш тип: ${matrix}</strong></p>
            <p>Аналитическая мета-структура вашей идентичности в текущем периоде опирается на 
            ${m > f ? 'инструментальные стратегии (достижения, контроль)' : 'экспрессивные стратегии (гармонизация, эмпатия)'}.</p>
            <p>Согласно Сандре Бем, андрогинность не является средним значением, это <b>высокая выраженность обоих векторов</b>. Если ваш результат ниже порога по одной из шкал, это не дефицит, а указание на текущий доминирующий вектор адаптации. Для расширения личности рекомендуется осознанная активация качеств из «проседающего» сектора.</p>
        `;
    }
</script>
</body>
</html>
